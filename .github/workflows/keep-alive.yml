name: Keep Render backend awake

on:
  schedule:
    # Render 무료 플랜은 15분 동안 요청이 없으면 잠든다. 그보다 짧은 주기로 핑을 보내
    # 콜드 스타트(재요청 시 30~60초 지연)를 방지한다.
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        run: curl -fsS https://budgettrip-api.onrender.com/api/health
