services:
  - type: web
    name: summer-travel
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: TOUR_API_KEY
        sync: false
      - key: KAKAO_REST_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: VITE_KAKAO_MAP_KEY
        sync: false
